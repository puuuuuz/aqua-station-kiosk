<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Aqua Station – ตู้บริการน้ำดื่ม (V114.1-STABILIZED-UI)</title>
    <script>
        const APP_VERSION = "V114.1-670-FULL-UI";
        console.log("%c 🚀 BOOTING LOCAL ASSETS: " + APP_VERSION, "color: #2ecc71; font-size: 20px; font-weight: bold;");
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        :root {
            --blue-dark: #0a4fa3;
            --blue: #0077b6;
            --cyan: #00b4d8;
            --sky: #90e0ef;
            --white: #fff;
            --green: #10b981;
            --red: #ef4444;
            --bg: #e8f4fc;
        }
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Sarabun', sans-serif; margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background: var(--bg); color: #333; }
        .screen { display: none; flex-direction: column; height: 100%; }
        .screen.active { display: flex; }
        .kiosk-header { background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue) 55%, var(--cyan) 100%); padding: 22px 39px; color: white; display: flex; justify-content: space-between; align-items: center; }
        .kiosk-body { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; }
        .btn-stop { width: 100%; padding: 25px; background: var(--red); color: white; border: none; border-radius: 22px; font-size: 28px; font-weight: 800; cursor: pointer; box-shadow: 0 8px 28px rgba(239, 68, 68, .45); }
        
        #debugConsole { display: block; position: fixed; bottom: 0; left: 0; width: 100%; height: 360px; background: rgba(5,10,20,0.97); color:#ccc; font-family:monospace; font-size:11px; padding:8px; z-index: 9999; border-top: 2px solid #00f2fe; display: flex; flex-direction: column; }
        #logArea { flex: 1; overflow-y: auto; background: #000; border: 1px solid #333; padding: 5px; font-size: 10px; margin-top: 5px; }
        .diag-row { border-bottom: 1px solid #1a1a2e; padding: 2px 0; display: flex; gap: 8px; }
        .console-btn { background:#1a5276; color:white; border:1px solid #3498db; padding:6px 14px; border-radius:4px; cursor:pointer; font-size:12px; font-weight:bold; }
        
        .water-container { width: 238px; height: 300px; border: 6px solid var(--blue-dark); border-radius: 28px; position: relative; overflow: hidden; background: #e8f9ff; margin-bottom: 20px; }
        .water-fill { position: absolute; bottom: 0; width: 100%; background: var(--blue); height: 0%; transition: height 0.3s ease; }
        .water-label { position: absolute; width:100%; text-align:center; bottom:20px; font-size:40px; font-weight:900; color:white; text-shadow: 0 2px 5px rgba(0,0,0,0.5); z-index: 2; }
    </style>
</head>
<body>
    <div id="screen-standby" class="screen active">
        <div class="kiosk-header">
            <div>
                <div style="font-size:15px; opacity:0.8;">AQUA STATION</div>
                <div style="font-size:30px; font-weight:900;">ยินดีต้อนรับ (V114.1)</div>
            </div>
            <div id="clock" style="font-size:36px; font-weight:700;">--:--</div>
        </div>
        <div class="kiosk-body" style="justify-content:center;">
             <div style="font-size:80px; margin-bottom:10px;">💧</div>
             <div style="font-size:36px; font-weight:900; color:var(--blue-dark); text-align:center;">สแกนเพื่อรับน้ำดื่มฟรี</div>
             <button onclick="showScreen('qrdisplay')" style="margin-top:30px; padding:20px 40px; background:var(--blue); color:white; border:none; border-radius:15px; font-size:24px; font-weight:bold; cursor:pointer;">กดเพื่อเริ่ม</button>
        </div>
    </div>

    <div id="screen-qrdisplay" class="screen">
        <div class="kiosk-header"><div><div style="font-size:30px; font-weight:900;">สแกน QR Code</div></div></div>
        <div class="kiosk-body" style="justify-content:center;">
            <div style="background:white; padding:20px; border-radius:20px; box-shadow:0 10px 30px rgba(0,0,0,0.1);"><img id="kioskQrImage" src="" style="width:300px; height:300px;"></div>
            <div style="margin-top:20px; font-size:24px; font-weight:bold; color:var(--blue-dark);" id="sessionToken">AQ001-XXXX</div>
            <button onclick="showScreen('standby')" style="margin-top:30px; color:var(--red); border:2px solid var(--red); background:none; padding:10px 30px; border-radius:10px; font-size:20px; font-weight:bold;">ยกเลิก</button>
        </div>
    </div>

    <div id="screen-select-volume" class="screen">
        <div class="kiosk-header"><div><div style="font-size:30px; font-weight:900;">เลือกปริมาณน้ำ</div></div></div>
        <div class="kiosk-body" style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; padding:40px;">
             <button onclick="selectVolume(1)" class="console-btn" style="padding:40px 0; font-size:30px;">1 ลิตร</button>
             <button onclick="selectVolume(5)" class="console-btn" style="padding:40px 0; font-size:30px;">5 ลิตร</button>
             <button onclick="selectVolume(10)" class="console-btn" style="padding:40px 0; font-size:30px;">10 ลิตร</button>
             <button onclick="selectVolume(20)" class="console-btn" style="padding:40px 0; font-size:30px;">20 ลิตร</button>
        </div>
    </div>

    <div id="screen-dispense" class="screen">
        <div class="kiosk-header"><div><div style="font-size:30px; font-weight:900;">กำลังจ่ายน้ำ...</div></div></div>
        <div class="kiosk-body">
            <div class="water-container"><div id="waterFill" class="water-fill"></div><div id="dispenseLitersDisplay" class="water-label">0.00</div></div>
            <div style="font-size:24px; font-weight:bold;">จ่ายแล้ว: <span id="dispenseNow">0.00</span> / <span id="dispenseTarget">--</span> ลิตร</div>
            <button onclick="manualStop()" class="btn-stop" style="margin-top:20px;">⏹ หยุดเดี๋ยวนี้</button>
        </div>
    </div>

    <div id="screen-thankyou" class="screen">
        <div class="kiosk-header" style="background:var(--green);"><div><div style="font-size:30px; font-weight:900;">ขอบคุณที่ใช้บริการ!</div></div></div>
        <div class="kiosk-body" style="justify-content:center;">
             <div style="font-size:100px;">🎉</div>
             <div style="font-size:24px; margin-top:10px;">รับน้ำไปทั้งหมด <span id="finalAmount" style="font-weight:bold;">0.00</span> ลิตร</div>
             <div style="margin-top:30px; color:#666;">กลับหน้าหลักอัตโนมัติใน <span id="resetCountdown">5</span>...</div>
        </div>
    </div>

    <div id="debugConsole">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <span style="color:#00f2fe; font-weight:bold;">🛰️ DIAGNOSTIC CONSOLE (V114.1 · 670 PULSES)</span>
            <button onclick="toggleDebug()" style="background:#444; color:white; border:none; padding:4px 10px; border-radius:4px; font-size:10px;">HIDE</button>
        </div>
        <div style="display:flex; gap:10px; padding:10px 0;">
            <div style="background:#0a1628; padding:8px; flex:1;">Flow: <b id="t_flow" style="color:#00f2fe">--</b> | Pulses: <b id="s_pulses" style="color:white">0</b></div>
            <div style="background:#1a0a0a; padding:8px; flex:1;">K: <input id="kFactorInput" type="number" value="670" style="width:50px; background:#111; color:#e74c3c; border:1px solid #555;"> <button onclick="applyKFactor()" style="background:#922b21; color:white; border:none; padding:2px 5px; font-size:10px;">Set</button></div>
        </div>
        <div style="padding:10px 0; display:flex; gap:5px; flex-wrap:wrap;">
            <button onclick="testDispenseV2(1)" class="console-btn">1L</button><button onclick="testDispenseV2(5)" class="console-btn">5L</button><button onclick="testDispenseV2(10)" class="console-btn">10L</button><button onclick="manualStop()" class="console-btn" style="background:#922b21;">STOP</button><button onclick="forceReset()" class="console-btn" style="background:#333;">RESET</button>
        </div>
        <div id="logArea"></div>
    </div>

    <script>
        var FLOW_K_FACTOR = 670; var rxBuffer = []; var maxLiters = 0; var initialPulses = -1; var currentToken = null;
        function logToScreen(msg) { const area = document.getElementById('logArea'); const div = document.createElement('div'); div.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`; area.prepend(div); if (area.childNodes.length > 30) area.removeChild(area.lastChild); }
        window.onSerialReceiveHex = function(hexStr) { for (let i = 0; i < hexStr.length; i += 2) { rxBuffer.push(parseInt(hexStr.substr(i, 2), 16)); } processRxBuffer(); };
        function processRxBuffer() {
            while (rxBuffer.length > 0 && rxBuffer[0] !== 0x02) rxBuffer.shift();
            if (rxBuffer.length < 4) return;
            let lenField = (rxBuffer[2] << 8) | rxBuffer[3];
            let totalLength = lenField + 7;
            if (rxBuffer.length < totalLength) return;
            let p = rxBuffer.splice(0, totalLength);
            let dataBytes = p.slice(6, p.length - 2);
            if (dataBytes.length >= 12) {
                let flow = dataBytes[2] | (dataBytes[3] << 8);
                document.getElementById('t_flow').textContent = flow;
                if (initialPulses !== -1) { onWaterFlowUpdate(flow); }
            }
        }
        function onWaterFlowUpdate(currentBoardPulse) {
            if (initialPulses === -1) { initialPulses = currentBoardPulse; return; }
            let delta = currentBoardPulse - initialPulses;
            let liters = delta / FLOW_K_FACTOR;
            document.getElementById('s_pulses').textContent = delta;
            document.getElementById('dispenseLitersDisplay').textContent = liters.toFixed(2);
            document.getElementById('dispenseNow').textContent = liters.toFixed(2);
            document.getElementById('waterFill').style.height = Math.min(100, (liters/maxLiters)*100) + '%';
            if (liters >= maxLiters && maxLiters > 0) { endSession(); }
        }
        function testDispenseV2(L) {
            maxLiters = L; initialPulses = -1; document.getElementById('dispenseTarget').textContent = L; showScreen('dispense');
            let bHi = (Math.round(L * FLOW_K_FACTOR) >> 8) & 0xFF; let bLo = Math.round(L * FLOW_K_FACTOR) & 0xFF;
            sendPacket(0xC6, 0x53, [0x00, 0x64], "PUMP"); setTimeout(() => sendPacket(0xC3, 0x53, [bHi, bLo], "LOGIC"), 300);
        }
        function manualStop() { sendPacket(0xC6, 0x50, [0x00, 0x64], "PUMP"); setTimeout(() => sendPacket(0xC3, 0x50, [0x00], "LOGIC"), 200); maxLiters = 0; initialPulses = -1; }
        function forceReset() { location.reload(); }
        function sendPacket(id, cmd, data, label) {
            let len = data.length + 1; let p = [0x02, 0x01, (len >> 8) & 0xFF, len & 0xFF, 0x4D, id, cmd, ...data, 0x03];
            let bcc = 0; p.forEach(b => bcc ^= b); p.push(bcc);
            let hex = p.map(b => b.toString(16).padStart(2,'0').toUpperCase()).join('');
            if (window.AndroidSerial) window.AndroidSerial.sendHex(hex);
        }
        function showScreen(name) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + name).classList.add('active');
            if (name === 'qrdisplay') initQrSession();
            if (name === 'thankyou') { document.getElementById('finalAmount').textContent = (document.getElementById('s_pulses').textContent / FLOW_K_FACTOR).toFixed(2); startCountdown(); }
        }
        async function initQrSession() {
            try {
                const token = await window.createKioskSession(); currentToken = token;
                const url = `https://liff.line.me/2009501254-Ab3SWZfh?token=${token}`;
                document.getElementById('kioskQrImage').src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(url)}`;
                window.waitForScanFirebase(token, (d) => { if (d.status === 'confirmed') testDispenseV2(parseFloat(d.vol)); });
            } catch(e) { console.log(e); }
        }
        function selectVolume(L) { testDispenseV2(L); }
        function endSession() { manualStop(); showScreen('thankyou'); if (window.updateSessionResult && currentToken) window.updateSessionResult(currentToken, parseFloat(document.getElementById('finalAmount').textContent)); }
        function startCountdown() { let s = 5; let t = setInterval(() => { if(s-- <= 0) { clearInterval(t); showScreen('standby'); } }, 1000); }
        function toggleDebug() { const el = document.getElementById('debugConsole'); el.style.display = (el.style.display==='none'?'flex':'none'); }
        function applyKFactor() { FLOW_K_FACTOR = parseInt(document.getElementById('kFactorInput').value) || 670; }
        setInterval(() => { document.getElementById('clock').textContent = new Date().toLocaleTimeString(); }, 1000);
        setTimeout(() => { if (window.AndroidSerial) window.AndroidSerial.openPort('/dev/ttyS4', 115200); }, 1000);
    </script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, updateDoc, setDoc, addDoc, serverTimestamp, collection, query, where, getDocs, onSnapshot, increment } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        const firebaseConfig = { apiKey: "AIzaSyBuV5BoTuxSLB5yiW1TBoQ3uh_Ls6THBJQ", authDomain: "siam-circuit.firebaseapp.com", projectId: "siam-circuit", storageBucket: "siam-circuit.firebasestorage.app", messagingSenderId: "330527536801", appId: "1:330527536801:web:c0132854940609dd3f62e", };
        const app = initializeApp(firebaseConfig); const db = getFirestore(app);
        window.createKioskSession = async function() { const id = 'AQ-001-' + Math.random().toString(36).substr(2, 6).toUpperCase(); await addDoc(collection(db, "sessions"), { id: id, kioskId: 'AQ-001', status: 'pending', createdAt: serverTimestamp() }); return id; };
        window.waitForScanFirebase = function(token, cb) { const q = query(collection(db, "sessions"), where("id", "==", token)); return onSnapshot(q, (s) => s.forEach(d => cb(d.data()))); };
        window.updateSessionResult = async function(token, liters) { if (liters <= 0) return; await addDoc(collection(db, "transactions"), { machine: 'AQ-001', vol: liters, time: serverTimestamp(), method: 'QR Scan' }); await updateDoc(doc(db, "machines", "AQ-001"), { totalWater: increment(liters), lastSeen: serverTimestamp() }); };
    </script>
</body>
</html>
