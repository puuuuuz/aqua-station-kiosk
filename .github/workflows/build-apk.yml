name: Build Android APK (Kiosk)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🔄 Prepare www folder
        run: |
          mkdir -p www
          cp app.html www/index.html
          cp machine.png www/machine.png 2>/dev/null || true
          cp filters.png www/filters.png 2>/dev/null || true

      - name: 🔄 Capacitor Sync
        run: npx cap sync android

      - name: 📱 Install Android SDK manually
        run: |
          # Download and install command-line tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdtools.zip
          mkdir -p $HOME/android-sdk/cmdline-tools
          unzip -q /tmp/cmdtools.zip -d /tmp/cmdtools-extracted
          mv /tmp/cmdtools-extracted/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          
          export ANDROID_HOME=$HOME/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          
          # Accept licenses and install SDK packages
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH

      - name: 🔧 Make Gradle executable
        run: chmod +x android/gradlew

      - name: 📋 Show local.properties
        run: |
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          cat android/local.properties

      - name: 🏗️ Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --warning-mode all
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: aqua-station-kiosk-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
