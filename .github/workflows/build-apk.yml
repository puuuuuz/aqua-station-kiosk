name: Build Android APK (Kiosk)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🔄 Copy app.html → www/index.html
        run: |
          mkdir -p www
          cp app.html www/index.html
          cp machine.png www/machine.png 2>/dev/null || true
          cp filters.png www/filters.png 2>/dev/null || true

      - name: 🔄 Capacitor Sync
        run: npx cap sync android

      - name: 🔧 Make Gradle executable
        run: chmod +x android/gradlew

      - name: 📱 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: 🏗️ Accept Android Licenses
        run: yes | sdkmanager --licenses 2>/dev/null || true

      - name: 🏗️ Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: 📤 Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: aqua-station-kiosk-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
