name: Build Android APK (Kiosk)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: 🔧 Make Gradle executable
        run: chmod +x android/gradlew

      - name: 📱 Install Android SDK
        run: |
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O /tmp/cmdtools.zip
          mkdir -p $HOME/android-sdk/cmdline-tools
          unzip -q /tmp/cmdtools.zip -d /tmp/cmdtools-extracted
          mv /tmp/cmdtools-extracted/cmdline-tools $HOME/android-sdk/cmdline-tools/latest
          
          export ANDROID_HOME=$HOME/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin
          
          yes | sdkmanager --licenses > /dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"
          
          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$HOME/android-sdk/platform-tools" >> $GITHUB_PATH
          echo "$HOME/android-sdk/build-tools/34.0.0" >> $GITHUB_PATH

      - name: 📋 Write local.properties
        run: echo "sdk.dir=$HOME/android-sdk" > android/local.properties

      - name: 🏗️ Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --warning-mode all --info 2>&1 | tail -80

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: aqua-station-kiosk-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
